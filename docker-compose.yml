services:
  backend:
    image: python:3.11-slim
    container_name: jewelryai-backend
    working_dir: /workspace/apps/backend
    command: sh -c "pip install uv && UV_PROJECT_ENVIRONMENT=/tmp/.venv uv sync --dev && UV_PROJECT_ENVIRONMENT=/tmp/.venv uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace

  frontend:
    image: node:20-alpine
    container_name: jewelryai-frontend
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace/apps/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
